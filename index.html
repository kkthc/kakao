<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도시 상권 및 교통 인프라 분석기</title>
    <style>
        /* 기본 스타일 초기화 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #f7f5ee; /* 따뜻한 크림/아이보리 톤 */
        }

        /* 2분할 화면 컨테이너 */
        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바: 아기자기한 레트로 계산대 포스기 디자인 */
        #sidebar {
            width: 390px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fffefb; 
            border-right: 4px solid #ded9cd;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.05);
        }

        /* 계산대 모니터 화면 같은 상단 헤더 */
        #register-header {
            background: #343a40;
            color: #4ee44e; /* 복고풍 포스기 모니터 초록 글씨 */
            padding: 18px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-align: center;
            font-size: 15px;
            border-bottom: 4px solid #1e2225;
            letter-spacing: 1px;
        }

        /* 계산대 입체 버튼 느낌의 3분할 탭 컨테이너 */
        .tab-container {
            display: flex;
            background: #e9e5da;
            padding: 8px;
            gap: 6px;
        }

        .tab-button {
            flex: 1;
            padding: 12px 2px;
            border: 2px solid #bab4a5;
            border-radius: 8px; /* 장난감 버튼 모양 */
            background: #fdfcf9;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: #5d574a;
            text-align: center;
            box-shadow: 0 4px 0 #bab4a5; /* 입체감 효과 */
            transition: all 0.1s;
        }

        /* 버튼 누를 때 눌리는 효과 */
        .tab-button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #bab4a5;
        }

        /* 활성화된 탭 스타일 (각 인프라별 테마 색상) */
        .tab-button.active.store {
            background: #e3f2fd; border-color: #64b5f6; color: #0d47a1; box-shadow: 0 4px 0 #64b5f6;
        }
        .tab-button.active.bank {
            background: #e8f5e9; border-color: #81c784; color: #1b5e20; box-shadow: 0 4px 0 #81c784;
        }
        .tab-button.active.subway {
            background: #fff3e0; border-color: #ffb74d; color: #e65100; box-shadow: 0 4px 0 #ffb74d;
        }

        /* 실시간 교통정보 제어용 스페셜 하단 버튼 */
        #traffic-toggle-box {
            padding: 10px;
            background: #f1ede2;
            border-bottom: 2px solid #ded9cd;
        }

        #traffic-btn {
            width: 100%;
            padding: 10px;
            background: #ffeb3b;
            color: #333;
            border: 2px solid #fbc02d;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            box-shadow: 0 3px 0 #fbc02d;
        }
        #traffic-btn.active {
            background: #f44336;
            color: white;
            border-color: #d32f2f;
            box-shadow: 0 3px 0 #d32f2f;
        }

        /* 영수증 절취선 테두리 느낌의 리스트 영역 */
        #places-list {
            flex: 1;
            overflow-y: auto;
            margin: 0;
            padding: 10px;
            list-style: none;
            background: #ffffff;
        }

        #places-list li {
            padding: 14px;
            margin-bottom: 8px;
            background: #fffef9;
            border: 2px dashed #ded9cd; /* 영수증 점선 느낌 */
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #places-list li:hover {
            background: #faf7ed;
            transform: scale(1.01);
        }

        #places-list li h5 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #333;
        }

        #places-list li span {
            font-size: 11px;
            color: #777;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* ⭐️ 커스텀 물방울 핀 마커 디자인 */
        .cute-pin {
            background: white;
            border: 3px solid #4a453a;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg) translate(15px, -15px);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -2px 4px 6px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        /* 내부 이모지는 똑바로 회전 정렬 */
        .cute-pin span {
            transform: rotate(45deg);
            font-size: 18px;
            display: block;
        }

        /* 탭별 마커 테두리 색상 분리 */
        .cute-pin.store-border { border-color: #42a5f5; }
        .cute-pin.bank-border { border-color: #66bb6a; }
        .cute-pin.subway-border { border-color: #ffa726; }
    </style>
</head>
<body>

    <div id="container">
        <div id="sidebar">
            <div id="register-header">
                [POS] MARKET INFRA ANALYZER
            </div>
            
            <div class="tab-container">
                <button class="tab-button active store" id="tab-store">🏪 골목상권<br>(편의점)</button>
                <button class="tab-button bank" id="tab-bank">🏦 금융기반<br>(은행)</button>
                <button class="tab-button subway" id="tab-subway">🚇 교통인프라<br>(지하철역)</button>
            </div>

            <div id="traffic-toggle-box">
                <button id="traffic-btn">🚦 실시간 교통 흐름 피드: OFF</button>
            </div>

            <ul id="places-list">
                </ul>
        </div>
        
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c25959bee4e8d99438d9beb94983a83b&libraries=services&autoload=false"></script>
    
    <script>
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), 
                level: 5 // 요구사항: 확대 레벨 5
            };

            const map = new kakao.maps.Map(mapContainer, mapOptions);
            const placesService = new kakao.maps.services.Places();
            
            let customOverlays = []; 
            let currentCenter = null; 
            let isTrafficOn = false; // 교통정보 토글 상태 변수
            
            // 이미지 카테고리 코드 목록 매칭 데이터
            let currentCategory = "CS2"; // 초기값: 편의점
            let currentIcon = "🏪";
            let currentBorderClass = "store-border";

            // 위치 권한 요청 및 초기화
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    currentCenter = new kakao.maps.LatLng(lat, lon);

                    map.setCenter(currentCenter);

                    // 내 위치 중심점 마커 기본 생성
                    const centerMarker = new kakao.maps.Marker({
                        map: map,
                        position: currentCenter
                    });

                    // 100% 구별되는 카카오 공식 카테고리 검색 API 호출
                    executeCategorySearch(currentCategory);

                }, function(error) {
                    console.error("위치정보 거부", error);
                    currentCenter = map.getCenter();
                    executeCategorySearch(currentCategory);
                });
            }

            // ⭐️ 핵심 기능: 텍스트 검색 대신 '카테고리 코드' 전용 함수 사용 (오차 0%)
            function executeCategorySearch(categoryCode) {
                if (!currentCenter) return;
                
                placesService.categorySearch(categoryCode, searchCallback, {
                    location: currentCenter,
                    radius: 2000, // 내 중심 기준 반경 2km 검색
                    sort: kakao.maps.services.SortBy.DISTANCE
                });
            }

            // 카테고리 검색 결과 처리
            function searchCallback(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    displayResults(data);
                } else {
                    document.getElementById('places-list').innerHTML = '<li style="text-align:center;color:#999;font-size:12px;">주변 범위 내에 해당 인프라가 없습니다.</li>';
                    clearOverlays();
                }
            }

            // 마커 및 리스트 화면 매핑
            function displayResults(places) {
                const listContainer = document.getElementById('places-list');
                const bounds = new kakao.maps.LatLngBounds();

                clearOverlays();
                listContainer.innerHTML = '';
                bounds.extend(currentCenter);

                for (let i = 0; i < places.length; i++) {
                    const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                    
                    createCustomOverlay(placePosition, places[i].place_name);
                    const listItem = createListItem(places[i]);

                    bounds.extend(placePosition);

                    listItem.onclick = function() {
                        map.setCenter(placePosition);
                        map.setLevel(3);
                    };

                    listContainer.appendChild(listItem);
                }
                map.setBounds(bounds);
            }

            // 커스텀 이모지 핀 생성
            function createCustomOverlay(position, title) {
                const pinElement = document.createElement('div');
                pinElement.className = `cute-pin ${currentBorderClass}`;
                
                const iconSpan = document.createElement('span');
                iconSpan.innerText = currentIcon;
                pinElement.appendChild(iconSpan);

                pinElement.addEventListener('click', function() {
                    alert(`인프라 명칭: ${title}`);
                    map.setCenter(position);
                });

                const customOverlay = new kakao.maps.CustomOverlay({
                    position: position,
                    content: pinElement,
                    yAnchor: 1
                });

                customOverlay.setMap(map);
                customOverlays.push(customOverlay);
            }

            // 기존 마커 클리어
            function clearOverlays() {
                for (let i = 0; i < customOverlays.length; i++) {
                    customOverlays[i].setMap(null);
                }
                customOverlays = [];
            }

            // 영수증 리스트 엘리먼트 생성
            function createListItem(place) {
                const li = document.createElement('li');
                const address = place.road_address_name ? place.road_address_name : place.address_name;
                
                li.innerHTML = `
                    <h5>${currentIcon} ${place.place_name}</h5>
                    <span>${address}</span><br>
                    <span style="color:#8b8373; font-size:11px; display:inline-block; margin-top:4px;">💳 거리 오차범위: ${place.distance}m</span>
                `;
                return li;
            }

            // 탭 제어 엘리먼트
            const tabStore = document.getElementById('tab-store');
            const tabBank = document.getElementById('tab-bank');
            const tabSubway = document.getElementById('tab-subway');
            const trafficBtn = document.getElementById('traffic-btn');

            function resetTabStyles() {
                tabStore.classList.remove('active');
                tabBank.classList.remove('active');
                tabSubway.classList.remove('active');
            }

            // [Tab 1] 편의점 (CS2)
            tabStore.addEventListener('click', function() {
                resetTabStyles();
                tabStore.classList.add('active');
                currentCategory = "CS2";
                currentIcon = "🏪";
                currentBorderClass = "store-border";
                executeCategorySearch(currentCategory);
            });

            // [Tab 2] 은행 (BK9)
            tabBank.addEventListener('click', function() {
                resetTabStyles();
                tabBank.classList.add('active');
                currentCategory = "BK9";
                currentIcon = "🏦";
                currentBorderClass = "bank-border";
                executeCategorySearch(currentCategory);
            });

            // [Tab 3] 지하철역 (SW8)
            tabSubway.addEventListener('click', function() {
                resetTabStyles();
                tabSubway.classList.add('active');
                currentCategory = "SW8";
                currentIcon = "🚇";
                currentBorderClass = "subway-border";
                executeCategorySearch(currentCategory);
            });

            // [교통정보 토글 기능]
            trafficBtn.addEventListener('click', function() {
                if (!isTrafficOn) {
                    map.addOverlayMapTypeId(kakao.maps.MapTypeId.TRAFFIC);
                    trafficBtn.className = "active";
                    trafficBtn.innerText = "🚦 실시간 교통 흐름 피드: ON";
                    isTrafficOn = true;
                } else {
                    map.removeOverlayMapTypeId(kakao.maps.MapTypeId.TRAFFIC);
                    trafficBtn.className = "";
                    trafficBtn.innerText = "🚦 실시간 교통 흐름 피드: OFF";
                    isTrafficOn = false;
                }
            });
        });
    </script>
</body>
</html>
