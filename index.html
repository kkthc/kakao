<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏱️ 타임 세이버 - 시간 절약 여행 지도</title>
    <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css">
    <style>
        /* 기본 스타일 초기화 및 라운드 서체 적용 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'NanumSquareRound', sans-serif;
            background-color: #eae2d6; /* 가방 외벽 느낌의 옅은 베이지 배경 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 🧳 여행 가방(캐리어) 전체틀 프레임 컨셉 */
        #suitcase-frame {
            display: flex;
            width: 96%;
            height: 94vh;
            background: #ffffff;
            border: 12px solid #a68059; /* 클래식한 가죽 가방 테두리 선 표현 */
            border-radius: 35px; /* 전체적으로 동글동글한 가방 모양 */
            box-shadow: 0 15px 35px rgba(62, 49, 34, 0.2), inset 0 0 15px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;
        }

        /* 왼쪽 사이드바: 가방 안 물품 정리 패킹 리스트 디자인 */
        #sidebar {
            width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fbfbf9; 
            border-right: 6px dashed #d1c7bd; /* 가방 안쪽 지퍼/절취선 느낌 */
            box-sizing: border-box;
            z-index: 10;
        }

        /* 가방 네임택 디자인의 상단 헤더 */
        #nametag-header {
            background: #e26d5c; /* 이쁜 파스텔 오렌지 레드 */
            color: #ffffff;
            padding: 16px;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
            border-bottom: 4px solid #c95646;
            letter-spacing: 0.5px;
        }

        /* 아기자기한 계산대/포스기 버튼 느낌의 4분할 탭 컨테이너 */
        .tab-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: #f1ede4;
            padding: 8px;
            gap: 6px;
        }

        .tab-button {
            padding: 10px 2px;
            border: 2px solid #bdae9e;
            border-radius: 12px; /* 버튼도 완전 동글동글하게 */
            background: #ffffff;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            color: #5c534a;
            text-align: center;
            box-shadow: 0 3px 0 #bdae9e; /* 꾹꾹 누르고 싶게 만드는 입체감 효과 */
            transition: all 0.1s;
            font-family: 'NanumSquareRound', sans-serif;
        }

        /* 버튼을 클릭해서 아래로 쏙 들어가는 모션 구현 */
        .tab-button:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #bdae9e;
        }

        /* 4가지 테마별 탭 활성화 시 파스텔 포인트 색상 */
        .tab-button.active.attraction {
            background: #d4e6f1; border-color: #5499c7; color: #1f618d; box-shadow: 0 3px 0 #5499c7;
        }
        .tab-button.active.accommodation {
            background: #d5f5e3; border-color: #58d68d; color: #1e8449; box-shadow: 0 3px 0 #58d68d;
        }
        .tab-button.active.restaurant {
            background: #fdebd0; border-color: #f5b041; color: #b37d14; box-shadow: 0 3px 0 #f5b041;
        }
        .tab-button.active.timesaver {
            background: #f5eeeb; border-color: #e26d5c; color: #c95646; box-shadow: 0 3px 0 #e26d5c;
        }

        /* 시간 절약 의사결정을 유도하는 알림판 영역 */
        #guide-panel {
            padding: 12px 14px;
            background: #f5f3ec;
            margin: 10px;
            border-radius: 14px;
            font-size: 12px;
            color: #534e44;
            line-height: 1.6;
            border: 2px solid #e3dec9;
        }

        /* 여행 캐리어 안에 차곡차곡 담긴 영수증 테두리 형태의 결과 리스트 */
        #places-list {
            flex: 1;
            overflow-y: auto;
            margin: 0;
            padding: 10px;
            list-style: none;
            background: #ffffff;
        }

        #places-list li {
            padding: 14px;
            margin-bottom: 8px;
            background: #fffdfa;
            border: 2px dashed #dfdacf; 
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        #places-list li:hover {
            background: #faf7ee;
            transform: scale(1.02); /* 마우스 올리면 통통 튀는 효과 */
        }

        #places-list li h5 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #383530;
        }

        #places-list li span {
            font-size: 11px;
            color: #8c8577;
        }

        /* 오른쪽 지도 가방 내부 화면 영역 */
        #map {
            flex: 1;
            height: 100%;
            border-left: 2px solid #e3dec9;
        }

        /* 🎨 기획서 반영: 동글동글한 커스텀 물방울 오버레이 마커 핀 디자인 */
        .travel-marker-pin {
            background: #ffffff;
            border: 3px solid #333333;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg) translate(15px, -15px);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -3px 5px 10px rgba(0,0,0,0.22);
            cursor: pointer;
        }

        /* 마커 내부 이모지는 똑바로 서있도록 시계방향 회전 역정렬 */
        .travel-marker-pin span {
            transform: rotate(45deg);
            font-size: 18px;
            display: block;
        }

        /* 카테고리 종류별 마커 테두리 색상 매핑 분리 */
        .travel-marker-pin.attraction-border { border-color: #3498db; }
        .travel-marker-pin.accommodation-border { border-color: #2ecc71; }
        .travel-marker-pin.restaurant-border { border-color: #f39c12; }

        /* 📍 기획서 반영: 실시간 탐색의 기준이 되는 내 현재 위치 전용 고유 마커 핀 */
        .user-center-pin {
            background: #e26d5c;
            border: 3px solid #ffffff;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(226, 109, 92, 0.8);
            animation: pulseWave 2.2s infinite;
        }

        @keyframes pulseWave {
            0% { box-shadow: 0 0 0 0 rgba(226, 109, 92, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(226, 109, 92, 0); }
            100% { box-shadow: 0 0 0 0 rgba(226, 109, 92, 0); }
        }
    </style>
</head>
<body>

    <div id="suitcase-frame">
        
        <div id="sidebar">
            <div id="nametag-header">
                🧳 TIME-SAVER PACKING LIST
            </div>
            
            <div class="tab-container">
                <button class="tab-button active attraction" id="btn-attraction">🗼 관광명소<br>(AT4)</button>
                <button class="tab-button accommodation" id="btn-accommodation">🛌 추천숙박<br>(AD5)</button>
                <button class="tab-button restaurant" id="btn-restaurant">🍽️ 로컬맛집<br>(FD6)</button>
                <button class="tab-button timesaver" id="btn-timesaver">⏱️ 타임세이버<br>(ALL)</button>
            </div>

            <div id="guide-panel">
                <strong>🚦 실시간 교통 흐름 분석 모드 작동 중</strong><br>
                지도의 도로선 색상(🔴정체 / 🟢원활)을 확인하세요. 단순 공간적 거리보다 정체가 없는 도로변 인프라를 택하는 것이 이동 비용을 아끼는 합리적 지름길입니다.
            </div>

            <ul id="places-list">
                </ul>
        </div>
        
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c25959bee4e8d99438d9beb94983a83b&libraries=services&autoload=false"></script>
    
    <script>
        // 카카오 라이브러리가 메모리에 완벽 적재된 시점에 실행 환경 핸들링
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 획득 이전 디폴트 기준 좌표 (서울시청)
                level: 5 // 구체적 지시사항: 확대 레벨 5 설정
            };

            const map = new kakao.maps.Map(mapContainer, mapOptions);
            const placesService = new kakao.maps.services.Places();
            
            let customOverlays = []; // 생성된 커스텀 마커 인스턴스들을 일괄 제어할 배열 객체
            let activeInfoWindow = null; // 동시 다발적 말풍선 팝업 중첩을 차단하기 위한 통제 변수
            let currentCenter = null; 
            
            // 전역 스위칭 기본 상태 데이터 셋팅
            let currentCategory = "AT4"; 
            let currentIcon = "🗼";
            let currentBorderClass = "attraction-border";
            let isTimeSaverMode = false; // 4번째 탭(동시 결합 모델) 작동 여부 감지용 플래그

            // 기획서 반영 요구사항: 실시간 교통 흐름 오버레이 레이어를 상시 결합 상태로 가동
            map.addOverlayMapTypeId(kakao.maps.MapTypeId.TRAFFIC);

            // 기획서 요구사항: Geolocation 기술 기반 유저 현재 내 위치 실시간 트래킹
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    currentCenter = new kakao.maps.LatLng(lat, lon);

                    map.setCenter(currentCenter);

                    // 내 위치 표시용 커스텀 오버레이 고정
                    const userMarkerOverlay = new kakao.maps.CustomOverlay({
                        position: currentCenter,
                        content: '<div class="user-center-pin"></div>',
                        xAnchor: 0.5,
                        yAnchor: 0.5
                    });
                    userMarkerOverlay.setMap(map);

                    // 기획서 요구사항: 카테고리로 엄격 자동 검색 프로세스 연동
                    triggerCategoryPipeline(currentCategory);

                }, function(error) {
                    console.error("위치 추적 레이더 통신 차단됨", error);
                    currentCenter = map.getCenter();
                    triggerCategoryPipeline(currentCategory);
                });
            }

            // 실시간 인프라 추적 파이프라인 제어기
            function triggerCategoryPipeline(categoryCode) {
                if (!currentCenter) return;
                
                // 내 중심점 기준 반경 3km 내 데이터 탐색 및 거리순(DISTANCE) 정렬
                placesService.categorySearch(categoryCode, searchDataCallback, {
                    location: currentCenter,
                    radius: 3000, 
                    sort: kakao.maps.services.SortBy.DISTANCE 
                });
            }

            // 데이터 통신 완료 직후 응답 처리를 위한 피드백 함수
            function searchDataCallback(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    drawTravelDashboard(data);
                } else {
                    // 데이터 전무할 시 가방 안 리스트 알림 보정
                    if(!isTimeSaverMode) {
                        document.getElementById('places-list').innerHTML = '<li style="text-align:center;color:#999;font-size:12px;">주변 3km 내 인프라가 비어있습니다.</li>';
                        clearAllActiveOverlays();
                    }
                }
            }

            // 가방 안 리스트 뷰 및 오버레이 마커 맵 연동 렌더링 핵심 함수
            function drawTravelDashboard(places) {
                const listContainer = document.getElementById('places-list');
                const bounds = new kakao.maps.LatLngBounds();

                // 타임세이버 모드가 아닐 때(단일 탭 전환 시)에만 기존 마커 및 리스트 청소 지시 충족
                if (!isTimeSaverMode) {
                    clearAllActiveOverlays();
                    listContainer.innerHTML = '';
                }
                
                bounds.extend(currentCenter);

                // 장소 개수만큼 순회 렌더링 기법 사용
                for (let i = 0; i < places.length; i++) {
                    const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                    
                    // 기획서 요구사항: 카테고리별 분리 마커 구조 및 상세 커스텀 말풍선 탑재
                    generateCozyOverlay(placePosition, places[i]);
                    
                    const listItem = appendLuggageListItem(places[i]);
                    bounds.extend(placePosition);

                    // 영수증 목록 카드 클릭 시 해당 상권의 정체 구간 여부를 관제하도록 지도 축소 이동
                    listItem.onclick = function() {
                        map.setCenter(placePosition);
                        map.setLevel(3);
                    };

                    listContainer.appendChild(listItem);
                }
                
                // 타임세이버 다중 검색 결합 시 지도가 너무 요동치지 않도록 스케일 홀딩 처리
                if (!isTimeSaverMode) {
                    map.setBounds(bounds);
                }
            }

            // ✨ 기획서 요구사항: 커스텀 말풍선 디자인을 내포한 수제 오버레이 핀 제작 모듈
            function generateCozyOverlay(position, place) {
                const pinNode = document.createElement('div');
                pinNode.className = `travel-marker-pin ${currentBorderClass}`;
                
                const iconInner = document.createElement('span');
                iconInner.innerText = currentIcon;
                pinNode.appendChild(iconInner);

                // 말풍선 디자인 박스 세부 마크업 동적 설계
                const bubbleBox = document.createElement('div');
                bubbleBox.style.cssText = 'background:#ffffff; padding:12px; border-radius:14px; border:2px solid #333; font-size:12px; box-shadow:0 4px 10px rgba(0,0,0,0.15); white-space:nowrap; font-family:NanumSquareRound;';
                bubbleBox.innerHTML = `
                    <strong style="color:#e26d5c; font-size:13px;">${place.place_name}</strong><br>
                    <span style="color:#777; font-size:11px; display:inline-block; margin:4px 0;">${place.road_address_name || place.address_name}</span><br>
                    <span style="color:#2ecc71; font-weight:bold;">⏱️ 내 위치 기준: ${place.distance}m</span>
                `;

                const infoBubble = new kakao.maps.InfoWindow({
                    content: bubbleBox,
                    removable: true
                });

                // 마커 클릭 레이아웃 이벤트 체이닝 구현
                pinNode.addEventListener('click', function() {
                    if (activeInfoWindow) {
                        activeInfoWindow.close();
                    }
                    infoBubble.open(map, markerOverlayInstance);
                    activeInfoWindow = infoBubble;
                    map.setCenter(position);
                });

                const markerOverlayInstance = new kakao.maps.CustomOverlay({
                    position: position,
                    content: pinNode,
                    yAnchor: 1 
                });

                markerOverlayInstance.setMap(map);
                customOverlays.push(markerOverlayInstance); // 탭 이동 시 날리기 위해 적재 보관
            }

            // 탭 전환 시 기존 마커 흔적을 완전히 소거하는 유틸리티 함수
            function clearAllActiveOverlays() {
                if (activeInfoWindow) {
                    activeInfoWindow.close();
                }
                for (let i = 0; i < customOverlays.length; i++) {
                    customOverlays[i].setMap(null);
                }
                customOverlays = [];
            }

            // 알림장 노트 스타일 목록 카드 엘리먼트 반환 함수
            function appendLuggageListItem(place) {
                const li = document.createElement('li');
                const addressText = place.road_address_name ? place.road_address_name : place.address_name;
                
                li.innerHTML = `
                    <h5>${currentIcon} ${place.place_name}</h5>
                    <span>${addressText}</span><br>
                    <span style="color:#e26d5c; font-size:11px; display:inline-block; margin-top:6px; font-weight:bold;">🏃 공간 도달거리: ${place.distance}m</span>
                `;
                return li;
            }

            // 사이드바 포스기 버튼(탭) 스위칭 바인딩 구역
            const btnAttraction = document.getElementById('btn-attraction');
            const btnAccommodation = document.getElementById('btn-accommodation');
            const btnRestaurant = document.getElementById('btn-restaurant');
            const btnTimesaver = document.getElementById('btn-timesaver');

            function resetAllTabUIStyles() {
                btnAttraction.classList.remove('active');
                btnAccommodation.classList.remove('active');
                btnRestaurant.classList.remove('active');
                btnTimesaver.classList.remove('active');
            }

            // 🗼 탭 1 통제 파이프
            btnAttraction.addEventListener('click', function() {
                isTimeSaverMode = false;
                resetAllTabUIStyles();
                btnAttraction.classList.add('active');
                currentCategory = "AT4";
                currentIcon = "🗼";
                currentBorderClass = "attraction-border";
                triggerCategoryPipeline(currentCategory);
            });

            // 🛌 탭 2 통제 파이프
            btnAccommodation.addEventListener('click', function() {
                isTimeSaverMode = false;
                resetAllTabUIStyles();
                btnAccommodation.classList.add('active');
                currentCategory = "AD5";
                currentIcon = "🛌";
                currentBorderClass = "accommodation-border";
                triggerCategoryPipeline(currentCategory);
            });

            // 🍽️ 탭 3 통제 파이프
            btnRestaurant.addEventListener('click', function() {
                isTimeSaverMode = false;
                resetAllTabUIStyles();
                btnRestaurant.classList.add('active');
                currentCategory = "FD6";
                currentIcon = "🍽️";
                currentBorderClass = "restaurant-border";
                triggerCategoryPipeline(currentCategory);
            });

            // ⏱️ 탭 4: 태희가 고안한 올인원 타임세이버 스페셜 다중 맵핑 파이프
            btnTimesaver.addEventListener('click', function() {
                isTimeSaverMode = true;
                resetAllTabUIStyles();
                btnTimesaver.classList.add('active');
                
                // 기존 요소 일체 선제 초기화
                clearAllActiveOverlays();
                document.getElementById('places-list').innerHTML = '';

                // 비동기 통신 순차 누적 결합 연산 (세 카테고리 연속 호출 구조 구현)
                setTimeout(function() {
                    currentCategory = "AT4"; currentIcon = "🗼"; currentBorderClass = "attraction-border";
                    triggerCategoryPipeline("AT4");
                }, 0);

                setTimeout(function() {
                    currentCategory = "AD5"; currentIcon = "🛌"; currentBorderClass = "accommodation-border";
                    triggerCategoryPipeline("AD5");
                }, 200);

                setTimeout(function() {
                    currentCategory = "FD6"; currentIcon = "🍽️"; currentBorderClass = "restaurant-border";
                    triggerCategoryPipeline("FD6");
                }, 400);
            });
        });
    </script>
</body>
</html>
