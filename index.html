<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏱️ 타임 세이버 - 광역 시간 절약 여행 지도</title>
    <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css">
    <style>
        /* 기본 스타일 초기화 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'NanumSquareRound', sans-serif;
            background-color: #eae2d6; /* 가방 외벽 베이지 색상 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 🧳 여행 가방(캐리어) 외형 프레임 디자인 */
        #suitcase-frame {
            display: flex;
            width: 96%;
            height: 94vh;
            background: #ffffff;
            border: 12px solid #a68059; /* 가죽 테두리 표현 */
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(62, 49, 34, 0.2);
            overflow: hidden;
            position: relative;
        }

        /* 왼쪽 사이드바 패킹 리스트 스크린 */
        #sidebar {
            width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fbfbf9; 
            border-right: 6px dashed #d1c7bd;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 가방 네임택 테마의 상단 헤더 */
        #nametag-header {
            background: #e26d5c;
            color: #ffffff;
            padding: 14px;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        /* 전국구 위치 검색창 영역 */
        #search-box {
            padding: 12px;
            background: #f1ede4;
            border-bottom: 2px solid #e3dec9;
            display: flex;
            gap: 6px;
        }

        #keyword {
            flex: 1;
            padding: 10px;
            border: 2px solid #bdae9e;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'NanumSquareRound', sans-serif;
        }

        #search-btn {
            padding: 10px 14px;
            background: #a68059;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            font-family: 'NanumSquareRound', sans-serif;
            box-shadow: 0 3px 0 #7e5e3f;
        }

        #search-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #7e5e3f;
        }

        /* 포스기 버튼 테마의 4분할 탭 버튼 공간 */
        .tab-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: #f1ede4;
            padding: 0 8px 8px 8px;
            gap: 6px;
            border-bottom: 2px solid #e3dec9;
        }

        .tab-button {
            padding: 10px 2px;
            border: 2px solid #bdae9e;
            border-radius: 12px;
            background: #ffffff;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            color: #5c534a;
            text-align: center;
            box-shadow: 0 3px 0 #bdae9e;
            transition: all 0.1s;
            font-family: 'NanumSquareRound', sans-serif;
        }

        .tab-button:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #bdae9e;
        }

        /* 각 탭 활성화 시 파스텔 아이덴티티 컬러 매핑 */
        .tab-button.active.attraction {
            background: #d4e6f1; border-color: #5499c7; color: #1f618d; box-shadow: 0 3px 0 #5499c7;
        }
        .tab-button.active.accommodation {
            background: #d5f5e3; border-color: #58d68d; color: #1e8449; box-shadow: 0 3px 0 #58d68d;
        }
        .tab-button.active.restaurant {
            background: #fdebd0; border-color: #f5b041; color: #b37d14; box-shadow: 0 3px 0 #f5b041;
        }
        .tab-button.active.timesaver {
            background: #f5eeeb; border-color: #e26d5c; color: #c95646; box-shadow: 0 3px 0 #e26d5c;
        }

        /* 안내판 구역 */
        #guide-panel {
            padding: 12px;
            background: #f5f3ec;
            margin: 10px;
            border-radius: 14px;
            font-size: 11px;
            color: #534e44;
            line-height: 1.6;
            border: 2px solid #e3dec9;
        }

        /* 캐리어 속 소지품 카드 리스트 디자인 */
        #places-list {
            flex: 1;
            overflow-y: auto;
            margin: 0;
            padding: 10px;
            list-style: none;
            background: #ffffff;
        }

        #places-list li {
            padding: 14px;
            margin-bottom: 8px;
            background: #fffdfa;
            border: 2px dashed #dfdacf; 
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        #places-list li:hover {
            background: #faf7ee;
            transform: scale(1.02);
        }

        #places-list li h5 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #383530;
        }

        #places-list li span {
            font-size: 11px;
            color: #8c8577;
        }

        /* 오른쪽 지도 가방 내부 화면 영역 */
        #map {
            flex: 1;
            height: 100%;
            border-left: 2px solid #e3dec9;
        }

        /* ⭐️ 커스텀 오버레이 컨테이너 (말풍선 팝업을 내포하기 위해 상위 렐러티브 설정) */
        .marker-wrapper {
            position: relative;
            width: 36px;
            height: 36px;
        }

        /* 커스텀 물방울 오버레이 마커 핀 스타일 */
        .travel-marker-pin {
            background: #ffffff;
            border: 3px solid #333333;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -3px 5px 10px rgba(0,0,0,0.22);
            cursor: pointer;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .travel-marker-pin span {
            transform: rotate(45deg);
            font-size: 18px;
            display: block;
        }

        .travel-marker-pin.attraction-border { border-color: #3498db; }
        .travel-marker-pin.accommodation-border { border-color: #2ecc71; }
        .travel-marker-pin.restaurant-border { border-color: #f39c12; }

        /* 💬 수제 커스텀 여행용 말풍선 디자인 (기본 닫힘 상태) */
        .cute-info-bubble {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            border: 2.5px solid #333333;
            font-size: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.18);
            white-space: nowrap;
            z-index: 999;
            font-family: 'NanumSquareRound', sans-serif;
        }

        /* 말풍선 아래쪽의 귀여운 꼬리 표현 */
        .cute-info-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
        }
        .cute-info-bubble::before {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: #333333 transparent;
            display: block;
            width: 0;
            z-index: -1
