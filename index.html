<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 화면을 왼쪽과 오른쪽으로 2분할하는 컨테이너 */
        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 (검색창 + 결과 리스트) */
        #sidebar {
            width: 350px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            box-sizing: border-box;
            background: #ffffff;
            z-index: 10;
        }

        /* 검색 영역 */
        #search-box {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        #keyword {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        #search-btn {
            padding: 10px 15px;
            background: #fee500; /* 카카오 시그니처 옐로우 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        #search-btn:hover {
            background: #fada0a;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        #places-list {
            flex: 1;
            overflow-y: auto;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        #places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        #places-list li:hover {
            background: #f1f3f5;
        }

        #places-list li h5 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: #333;
        }

        #places-list li span {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="sidebar">
            <div id="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요 (예: 강남역)">
                <button id="search-btn">검색</button>
            </div>
            <ul id="places-list">
                </ul>
        </div>
        
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c25959bee4e8d99438d9beb94983a83b&libraries=services&autoload=false"></script>
    
    <script>
        // 지도가 제대로 로드된 후에 코드가 실행되도록 보장
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 허용 전 기본 중심 좌표 (서울시청)
                level: 5 // 지도 확대 레벨 요구사항 반영
            };

            // 지도 객체 생성
            const map = new kakao.maps.Map(mapContainer, mapOptions);

            // 장소 검색을 도와주는 서비스 객체 생성
            const placesService = new kakao.maps.services.Places();
            
            // 지도에 표시된 마커들을 관리할 배열
            let markers = [];

            // HTML이 열리면 곧바로 HTML5의 Geolocation으로 현재 위치를 요청
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    const currentPosition = new kakao.maps.LatLng(lat, lon);

                    // 지도의 중심을 사용자의 현재 위치로 변경
                    map.setCenter(currentPosition);

                    // 현재 위치에 표시할 마커 생성
                    const currentMarker = new kakao.maps.Marker({
                        map: map,
                        position: currentPosition
                    });

                    // 마커 위에 띄울 안내창 생성
                    const infoWindow = new kakao.maps.InfoWindow({
                        content: '<div style="padding:5px;font-size:12px;text-align:center;">현재 위치</div>'
                    });
                    infoWindow.open(map, currentMarker);

                }, function(error) {
                    console.error("위치 권한을 가져오는데 실패했습니다.", error);
                });
            }

            // 검색 버튼 및 엔터키 이벤트 바인딩
            document.getElementById('search-btn').addEventListener('click', executeSearch);
            document.getElementById('keyword').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    executeSearch();
                }
            });

            // 검색 실행 함수
            function executeSearch() {
                const keyword = document.getElementById('keyword').value;

                if (!keyword.trim()) {
                    alert('검색어를 입력해주세요!');
                    return;
                }

                // 카카오맵 서비스를 통해 키워드 검색 요청
                placesService.keywordSearch(keyword, searchCallback);
            }

            // 장소검색이 완료되었을 때 실행되는 콜백 함수
            function searchCallback(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    // 정상적으로 검색이 완료되면 리스트와 마커를 화면에 표시
                    displaySearchResults(data);
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    alert('검색 결과가 존재하지 않습니다.');
                } else if (status === kakao.maps.services.Status.ERROR) {
                    alert('검색 결과 중 오류가 발생했습니다.');
                }
            }

            // 검색 결과를 화면(리스트+지도)에 보여주는 함수
            function displaySearchResults(places) {
                const listContainer = document.getElementById('places-list');
                const bounds = new kakao.maps.LatLngBounds();

                // 기존에 지도에 있던 검색 마커들과 리스트를 초기화
                clearMarkers();
                listContainer.innerHTML = '';

                // 검색된 장소의 개수만큼 반복 처리
                for (let i = 0; i < places.length; i++) {
                    const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                    
                    // 지도에 마커 추가
                    const marker = createMarker(placePosition);
                    
                    // 왼쪽에 들어갈 HTML 리스트 아이템 생성
                    const listItem = createListItem(places[i]);

                    // 검색된 위치들을 모두 포함할 수 있도록 지도 범위 설정 객체에 추가
                    bounds.extend(placePosition);

                    // 리스트 아이템을 클릭했을 때 해당 장소로 지도 이동 및 확대
                    listItem.onclick = function() {
                        map.setCenter(placePosition);
                        map.setLevel(3); // 상세히 볼 수 있도록 확대 레벨 변경
                    };

                    listContainer.appendChild(listItem);
                }

                // 검색 결과들을 한눈에 볼 수 있도록 지도 화면 범위를 재조정
                map.setBounds(bounds);
            }

            // 마커를 생성하고 배열에 저장하는 함수
            function createMarker(position) {
                const marker = new kakao.maps.Marker({
                    position: position,
                    map: map
                });
                markers.push(marker);
                return marker;
            }

            // 이전 검색 마커들을 지도에서 지우는 함수
            function clearMarkers() {
                for (let i = 0; i < markers.length; i++) {
                    markers[i].setMap(null);
                }
                markers = [];
            }

            // 검색 결과 리스트 Element를 만드는 함수
            function createListItem(place) {
                const li = document.createElement('li');
                
                let htmlContent = `<h5>${place.place_name}</h5>`;
                if (place.road_address_name) {
                    htmlContent += `<span>${place.road_address_name}</span>`;
                } else {
                    htmlContent += `<span>${place.address_name}</span>`;
                }
                
                li.innerHTML = htmlContent;
                return li;
            }
        });
    </script>
</body>
</html>
